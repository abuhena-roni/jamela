<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamela</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Minimal Link Style */
        h1 a {
            text-decoration: none; /* Underline remove korar jonno */
            color: inherit;        /* H1 er color e thakbe */
            transition: 0.3s;      /* Smooth effect-er jonno */
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
        }

        /* Hover korle halka effect */
        h1 a:hover {
            color: #000;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>
        <a href="https://gemini.google.com/share/4344a47c73bf">Jamela 01</a>
    </h1>
</body>
