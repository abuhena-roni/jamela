<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamela - Big & Bold</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #6A7E3F;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        h1 {
            margin: 0;
            /* সাইজ অনেক বাড়ানো হয়েছে */
            font-size: 80px; 
            font-weight: 700; /* একটু মোটা করা হয়েছে */
            letter-spacing: -2px; /* লেটার স্পেসিং কমিয়ে মডার্ন লুক দেওয়া হয়েছে */
            text-transform: uppercase; /* সব বড় হাতের অক্ষর */
        }

        h1 a {
            text-decoration: none;
            color: #FEFBEA;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        h1 a:hover {
            color: #F4C430;
            transform: scale(1.1); /* হোভার করলে লেখাটা একটু বড় হয়ে আপনার দিকে আসবে */
        }

        /* মোবাইলে যাতে স্ক্রিনের বাইরে চলে না যায় তার জন্য */
        @media (max-width: 600px) {
            h1 {
                font-size: 40px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <h1>
        <a href="https://gemini.google.com/share/4344a47c73bf" target="_blank">Jamela 01</a>
    </h1>

</body>
</html>
